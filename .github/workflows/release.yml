name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore PsxInject.sln

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish PsxInject/PsxInject.csproj
          -c Release -r win-x64
          -o publish
          --nologo

      - name: Rename artifact with version tag
        shell: pwsh
        run: |
          $tag      = "${{ github.ref_name }}"
          $exeName  = "PSX-Inject-$tag-win-x64.exe"
          Move-Item publish/PsxInject.exe "publish/$exeName"
          Get-ChildItem publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/PSX-Inject-*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
